<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PanelSync - Login</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --surface: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .google-btn {
            background: white;
            color: #1e293b;
            border: none;
            padding: 0.875rem 1.5rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
            background: #f8fafc;
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        #errorBox {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            color: #fca5a5;
            font-size: 0.875rem;
            display: none;
            text-align: left;
            line-height: 1.5;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .footer a {
            color: #818cf8;
            text-decoration: none;
        }

        /* Decorative blobs */
        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.15;
            z-index: -1;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: #c084fc;
        }

        /* Dept Modal CSS */
        .dept-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .dept-modal {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        .dept-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }

        .dept-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .dept-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            transform: translateY(-2px);
        }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>

<body>
    <!-- Dept Selection Modal -->
    <div id="deptModalOverlay" class="dept-modal-overlay" style="display: none;">
        <div class="dept-modal">
            <h2 style="margin-top:0;">Select Department</h2>
            <p style="color: var(--text-dim);">Please choose your department to continue.</p>
            <div class="dept-grid" id="deptGrid">
                <!-- Buttons injected by JS -->
            </div>
        </div>
    </div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">
        <div class="logo">PanelSync CLASSIC</div>
        <div class="subtitle">PanelSync Classic Control Center</div>

        <button id="loginBtn" class="google-btn" onclick="handleLogin()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon"
                alt="Google">
            Sign in with Google
        </button>

        <div id="errorBox">
            <strong>Access Denied</strong><br>
            Your account is not authorized to access this panel.
            <br><br>
            Contact <strong>Sam Joshua</strong> for access permissions.
        </div>

        <!-- <div class="footer">
            Built with 💛 by</br>Sam Joshua.</br></br><strong>Francis Xavier Engineering College  &copy; 2026</strong>
        </div> -->
    </div>

    <script>
        // Firebase Configuration (DO NOT REMOVE)
        var firebaseConfig = {
            apiKey: "AIzaSyC3TwG6SAgrBcVoHHPEWDl8DluGldZTYcs",
            authDomain: "civic-voice-530e3.firebaseapp.com",
            databaseURL: "https://civic-voice-530e3-default-rtdb.firebaseio.com",
            projectId: "civic-voice-530e3",
            storageBucket: "civic-voice-530e3.firebasestorage.app",
            messagingSenderId: "445788979324",
            appId: "1:445788979324:web:7d454068b866150f0c49f9",
            measurementId: "G-QGZD0JBDVH"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.database();
        const loginBtn = document.getElementById('loginBtn');
        const errorBox = document.getElementById('errorBox');

        const urlParams = new URLSearchParams(window.location.search);
        const currentDept = urlParams.get('dept');

        let isBootstrapMode = false;

        db.ref('depts').once('value').then(snapshot => {
            const depts = snapshot.val() || {};
            const allowedDepts = Object.keys(depts);

            if (allowedDepts.length === 0) {
                isBootstrapMode = true;
                // Allow login card to show without ?dept=
            } else if (!currentDept || !allowedDepts.includes(currentDept)) {
                // Show modal and hide login card
                document.querySelector('.login-card').style.display = 'none';
                document.getElementById('deptModalOverlay').style.display = 'flex';
                
                const deptGrid = document.getElementById('deptGrid');
                allowedDepts.forEach(dept => {
                    const btn = document.createElement('button');
                    btn.className = 'dept-btn';
                    btn.innerText = dept;
                    btn.onclick = () => {
                        window.location.href = `?dept=${dept}`;
                    };
                    deptGrid.appendChild(btn);
                });
            } else {
                // Auto-redirect if already logged in and session exists
                auth.onAuthStateChanged(user => {
                    if (user && sessionStorage.getItem('auth') === 'true') {
                        window.location.href = `admin.html?dept=${currentDept}`;
                    }
                });
            }
        });

        function handleLogin() {
            loginBtn.disabled = true;
            loginBtn.innerText = "Connecting...";
            errorBox.style.display = "none";

            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(result => {
                    verifyAccess(result.user.email);
                })
                .catch(error => {
                    console.error("Auth Error:", error);
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon"> Sign in with Google';
                });
        }

        function emailToKey(email) {
            return email.toLowerCase().replace(/\./g, "_").replace(/@/g, "_");
        }

        function verifyAccess(email) {
            const sanitizedEmail = emailToKey(email);
            console.log("Logged email:", email);
            console.log("Generated key:", sanitizedEmail);
            
            if (isBootstrapMode) {
                db.ref(`users/${sanitizedEmail}`).once('value')
                    .then(snapshot => {
                        const user = snapshot.val();
                        if (user && user.active === true && user.roleLevel === 3) {
                            sessionStorage.setItem('auth', 'true');
                            sessionStorage.setItem('adminEmail', email);
                            sessionStorage.setItem('roleLevel', user.roleLevel);
                            window.location.href = 'admin.html';
                        } else {
                            throw new Error('Bootstrap requires Super User');
                        }
                    })
                    .catch(err => {
                        console.error("Bootstrap Access Error:", err);
                        auth.signOut();
                        sessionStorage.clear();
                        errorBox.innerHTML = "<strong>Setup Required</strong><br>Only Super Users can perform initial setup.";
                        errorBox.style.display = "block";
                        loginBtn.disabled = false;
                        loginBtn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon"> Sign in with Google';
                    });
                return;
            }

            // Check global users first
            let userRoleLevel = 0;
            db.ref(`users/${sanitizedEmail}`).once('value')
                .then(snapshot => {
                    const user = snapshot.val();
                    if (user && user.active === true && user.roleLevel >= 1) {
                        userRoleLevel = user.roleLevel;
                        return true;
                    }
                    // If not found or not active globally, check department
                    return db.ref(`dept/${currentDept}/users/${sanitizedEmail}`).once('value')
                        .then(deptSnapshot => {
                            const deptUser = deptSnapshot.val();
                            if (deptUser && deptUser.active === true && deptUser.roleLevel >= 1) {
                                userRoleLevel = deptUser.roleLevel;
                                return true;
                            }
                            return false;
                        });
                })
                .then(isAllowed => {
                    if (isAllowed) {
                        sessionStorage.setItem('auth', 'true');
                        sessionStorage.setItem('adminEmail', email);
                        sessionStorage.setItem('roleLevel', userRoleLevel);
                        window.location.href = `admin.html?dept=${currentDept}`;
                    } else {
                        throw new Error('Unauthorized');
                    }
                })
                .catch(err => {
                    console.error("Access Check Error:", err);
                    auth.signOut();
                    sessionStorage.clear();
                    errorBox.innerHTML = "<strong>Access Denied</strong><br>Your account is not authorized to access this panel.<br><br>Contact <strong>Sam Joshua</strong> for access permissions.";
                    errorBox.style.display = "block";
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon"> Sign in with Google';
                });
        }
    </script>
</body>

</html>
