<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>PanelSync Display</title>
  <style>
    /* CSS resets and layout */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      overflow: hidden;
      font-family: sans-serif;
    }

    #viewport {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .media-layer {
      max-width: 100%;
      max-height: 100%;
      position: absolute;
      display: none;
    }

    .media-layer.active {
      display: block;
    }

    /* textPlayer styles */
    .text-player-class {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 5%;
      box-sizing: border-box;
      font-size: 6vw;
      font-weight: bold;
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .text-player-class.active {
      display: flex !important;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide.inactive {
      opacity: 0;
      z-index: 1;
    }

    #progressBar {
      position: fixed;
      bottom: 0;
      right: 0;
      height: 2px;
      background: white;
      width: 100%;
      z-index: 3000;
      transform-origin: right;
    }

    /* Watermark Styles */
    #watermark {
      position: fixed;
      bottom: 15px;
      right: 15px;
      text-align: right;
      z-index: 1000;
      opacity: 0.9;
      pointer-events: none;
      transition: opacity 0.3s;
      background: rgba(60, 60, 60, 0.4);
      padding: 6px 12px;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    #watermark .small {
      font-size: 10px;
      margin-bottom: 0px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #watermark .main {
      font-size: 13px;
      font-weight: bold;
    }

    /* Fullscreen Button Styles */
    #fullscreenBtn {
      position: fixed;
      bottom: 70px;
      right: 20px;
      z-index: 2000;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s;
      display: none;
      /* Controlled by JS mousemove */
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #fullscreenBtn:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    #debugOverlay {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      z-index: 10;
    }
  </style>
</head>

<body>

  <div id="viewport">
    <div id="slideA" class="slide inactive">
      <img id="imagePlayerA" class="media-layer" alt="Signage Content">
      <video id="videoPlayerA" class="media-layer" playsinline></video>
      <div id="textPlayerA" class="media-layer text-player-class"></div>
    </div>
    <div id="slideB" class="slide inactive">
      <img id="imagePlayerB" class="media-layer" alt="Signage Content">
      <video id="videoPlayerB" class="media-layer" playsinline></video>
      <div id="textPlayerB" class="media-layer text-player-class"></div>
    </div>
  </div>
  <div id="progressBar"></div>

  <!-- Features -->
  <div id="watermark">
    <div class="small">Built by</div>
    <div class="main" id="dynamicName">II CSE C</div>
  </div>

  <button id="fullscreenBtn" onclick="toggleFullscreen()">Enter Fullscreen</button>
  <div id="debugOverlay">PanelSync Classic Display v2.0</div>

  <script>
    // ==========================================
    // LEGACY SMART TV COMPATIBILITY (ES5 ONLY)
    // ==========================================

    var RTDB_URL = 'https://civic-voice-530e3-default-rtdb.firebaseio.com/media.json';
    var SETTINGS_URL = 'https://civic-voice-530e3-default-rtdb.firebaseio.com/settings.json';
    var mediaArray = [];
    var currentIndex = -1;
    var timer = null;
    var nameList = ["II CSE C"];
    // var nameList = ["Sam Joshua", "Team PanelSync", "II CSE C"];
    var nameIndex = 0;
    var mouseMoveTimer = null;

    var transitionType = 'cut';
    var activeLayer = 'B';
    var currentTimer = null;
    var videoFallbackTimer = null;

    var nameEl = document.getElementById('dynamicName');
    var fsBtn = document.getElementById('fullscreenBtn');
    var progressBar = document.getElementById('progressBar');

    function startProgressBar(durationSeconds) {
      if (!progressBar) return;
      progressBar.style.transition = 'none';
      progressBar.style.width = '100%';
      void progressBar.offsetWidth; // Force reflow
      if (durationSeconds > 0) {
        progressBar.style.transition = 'width ' + durationSeconds + 's linear';
        progressBar.style.width = '0%';
      }
    }

    function getLayer(layerName) {
      return {
        container: document.getElementById('slide' + layerName),
        imgEl: document.getElementById('imagePlayer' + layerName),
        vidEl: document.getElementById('videoPlayer' + layerName),
        textEl: document.getElementById('textPlayer' + layerName)
      };
    }

    function fetchSettings() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', SETTINGS_URL, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            if (data && data.transition) {
              transitionType = data.transition;
            } else {
              transitionType = 'cut';
            }
          } catch (e) {
            console.error("Settings Parse Error", e);
          }
        }
      };
      xhr.send();
    }

    function fetchMedia() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', RTDB_URL, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4 && xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            if (data) {
              var tempArray = [];
              if (Array.isArray(data)) {
                // Legacy array fallback
                for (var i = 0; i < data.length; i++) {
                  if (data[i]) tempArray.push(data[i]);
                }
              } else {
                // New object structure
                for (var key in data) {
                  if (data.hasOwnProperty(key)) {
                    tempArray.push(data[key]);
                  }
                }
              }

              // Sort strictly by the 'order' field
              tempArray.sort(function(a, b) {
                var orderA = (a.order !== undefined) ? parseInt(a.order, 10) : 999;
                var orderB = (b.order !== undefined) ? parseInt(b.order, 10) : 999;
                return orderA - orderB;
              });

              mediaArray = tempArray;
              if (currentIndex === -1 && mediaArray.length > 0) {
                nextSlide();
              }
            }
          } catch (e) {
            console.error("JSON Parse Error", e);
          }
        }
      };
      xhr.send();
    }

    function nextSlide() {
      if (mediaArray.length === 0) {
        currentTimer = setTimeout(nextSlide, 5000);
        return;
      }

      currentIndex++;
      if (currentIndex >= mediaArray.length) {
        currentIndex = 0;
      }

      var item = mediaArray[currentIndex];
      console.log("Current slide:", item);

      if (!item || !item.type) {
        nextSlide();
        return;
      }

      playItem(item);
    }

    function setupLayer(layer, item) {
      layer.imgEl.classList.remove('active');
      layer.textEl.classList.remove('active');
      layer.vidEl.classList.remove('active');

      if (item.type === 'video') {
        layer.vidEl.src = item.url;
        layer.vidEl.classList.add('active');
        layer.vidEl.muted = false;
      } else if (item.type === 'text') {
        layer.textEl.style.backgroundColor = item.bgColor || '#000000';
        layer.textEl.style.color = item.textColor || '#ffffff';
        layer.textEl.textContent = item.content;
        layer.textEl.classList.add('active');
      } else if (item.type === 'image') {
        layer.imgEl.src = item.url;
        layer.imgEl.classList.add('active');
      }
    }

    function playItem(item) {
      if (currentTimer) {
        clearTimeout(currentTimer);
        currentTimer = null;
      }
      if (videoFallbackTimer) {
        clearTimeout(videoFallbackTimer);
        videoFallbackTimer = null;
      }

      var nextLayerName = (activeLayer === 'A') ? 'B' : 'A';
      var nextLayer = getLayer(nextLayerName);
      var currentLayerObj = getLayer(activeLayer);

      var duration = 5;

      if (item.type === 'image') {
        duration = parseInt(item.duration, 10) || 5;
        // 1. IMAGE PRELOADING (CRITICAL)
        var preload = new Image();
        preload.onload = function() {
          setupLayer(nextLayer, item);
          startSlide(nextLayerName, currentLayerObj, nextLayer, duration, false);
        };
        preload.onerror = function() {
          console.warn("Failed to load image:", item.url);
          nextSlide();
        };
        preload.src = item.url;

      } else if (item.type === 'text') {
        duration = parseInt(item.duration, 10) || 10;
        setupLayer(nextLayer, item);
        startSlide(nextLayerName, currentLayerObj, nextLayer, duration, false);

      } else if (item.type === 'video') {
        setupLayer(nextLayer, item);
        nextLayer.vidEl.onended = function () {
          if (activeLayer === nextLayerName) {
            nextSlide();
          }
        };

        var playPromise = nextLayer.vidEl.play();
        if (playPromise !== undefined) {
          playPromise.catch(function (error) {
            console.warn("Autoplay blocked", error);
            nextSlide();
          });
        }

        if (!isNaN(nextLayer.vidEl.duration) && nextLayer.vidEl.duration > 0) {
          duration = nextLayer.vidEl.duration;
          startSlide(nextLayerName, currentLayerObj, nextLayer, duration, true);
        } else {
          nextLayer.vidEl.onloadedmetadata = function () {
            if (videoFallbackTimer) {
              clearTimeout(videoFallbackTimer);
              videoFallbackTimer = null;
            }
            duration = nextLayer.vidEl.duration;
            startSlide(nextLayerName, currentLayerObj, nextLayer, duration, true);
          };
          videoFallbackTimer = setTimeout(function () {
            if (nextLayer.container.className.indexOf('inactive') !== -1) {
              duration = 10;
              startSlide(nextLayerName, currentLayerObj, nextLayer, duration, true);
            }
          }, 2000);
        }
      } else {
        nextSlide();
      }
    }

    // UNIFIED SLIDE CONTROLLER
    function startSlide(nextLayerName, currentLayer, nextLayer, duration, isVideo) {
      // 1. Handle transition
      if (transitionType === 'cut') {
        nextLayer.container.style.transition = 'none';
        currentLayer.container.style.transition = 'none';
      } else {
        nextLayer.container.style.transition = 'opacity 0.5s ease';
        currentLayer.container.style.transition = 'opacity 0.5s ease';
      }

      nextLayer.container.className = 'slide active';
      currentLayer.container.className = 'slide inactive';

      activeLayer = nextLayerName;

      // 2. Start progress bar EXACTLY when slide becomes visible
      startProgressBar(duration);

      // 3. Schedule next slide
      if (!isVideo) {
        currentTimer = setTimeout(nextSlide, duration * 1000);
      }

      // 4. Cleanup hidden container gracefully (no DOM clearing before fade)
      setTimeout(function () {
        if (currentLayer.container.className.indexOf('inactive') !== -1) {
          if (currentLayer.vidEl) {
            currentLayer.vidEl.pause();
            currentLayer.vidEl.src = "";
          }
        }
      }, 600);
    }

    // Fullscreen Logic
    function toggleFullscreen() {
      var doc = window.document;
      var docEl = doc.documentElement;

      var requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
      var cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

      if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
        requestFullScreen.call(docEl);
      } else {
        cancelFullScreen.call(doc);
      }
    }

    // Watermark Rotation
    function rotateNames() {
      nameIndex++;
      if (nameIndex >= nameList.length) nameIndex = 0;
      nameEl.textContent = nameList[nameIndex];
    }

    // UI Interactions
    document.addEventListener('mousemove', function () {
      fsBtn.style.display = 'block';
      fsBtn.style.opacity = '1';
      if (mouseMoveTimer) clearTimeout(mouseMoveTimer);
      mouseMoveTimer = setTimeout(function () {
        fsBtn.style.opacity = '0';
        setTimeout(function () { fsBtn.style.display = 'none'; }, 500);
      }, 3000);
    });

    // Initialize
    function init() {
      fetchSettings();
      fetchMedia();

      // Background sync every 10 seconds
      setInterval(function () {
        fetchSettings();
        fetchMedia();
      }, 10000);

      // Watermark rotation every 5 seconds
      setInterval(rotateNames, 5000);

      // Auto-fullscreen trigger with delay
      setTimeout(function () {
        try {
          toggleFullscreen();
        } catch (e) {
          console.warn("Initial FS blocked - needs user gesture");
        }
      }, 3000);
    }

    // Boot
    window.onload = init;

  </script>
</body>

</html>
